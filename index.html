<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime US Finds</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .brand-dark { color: #2B3321; }
        .brand-bg-dark { background-color: #5B634E; }
    </style>
</head>
<body class="bg-[#FAF9F5] text-gray-800 font-sans">

    <!-- 1. Top Announcement Bar -->
    <div class="brand-bg-dark text-white text-xs tracking-widest text-center py-2 uppercase font-medium">
        Discover Premium Finds & Top Deals Every Day
    </div>

    <!-- 2. Header / Navigation -->
    <header class="border-b border-gray-200 sticky top-0 bg-[#FAF9F5]/95 backdrop-blur-sm z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <nav class="hidden md:flex space-x-6 text-xs uppercase tracking-wider font-semibold text-gray-600">
                <a href="#" class="hover:text-black">Home</a>
                <a href="#" class="hover:text-black">Best Sellers</a>
                <a href="#" class="hover:text-black">Home Decor</a>
                <a href="#" class="hover:text-black">About</a>
            </nav>
            <div class="text-xl md:text-2xl font-serif font-bold tracking-tight text-center flex-1 md:flex-none">
                <a href="#" class="brand-dark">PRIME US FINDS</a>
            </div>
            <div class="flex items-center space-x-4 text-gray-600">
                <button class="hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" /></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 3. Hero Section -->
    <section class="relative h-[60vh] bg-gray-300">
        <img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=1200" alt="Hero Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-4xl md:text-6xl text-white font-serif font-light mb-6 tracking-wide drop-shadow-sm">Step Into Premium Style</h1>
        </div>
    </section>

    <!-- 4. Dynamic Products From Google Sheet -->
    <section class="max-w-7xl mx-auto px-4 py-16">
        <h2 class="text-2xl font-serif mb-8 text-center brand-dark uppercase tracking-widest text-sm font-bold">Our Premium Finds</h2>
        <div id="customer-product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
            <!-- Loading state -->
            <p class="col-span-full text-center text-gray-500 py-10">Loading premium finds...</p>
        </div>
    </section>

    <script>
        // ⚠️ અહીં તમારી સાચી Google Sheet ID નાખો
        const SHEET_ID = 'YOUR_GOOGLE_SHEET_ID_HERE'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                // Google વિઝ્યુઅલાઈઝેશન રિસ્પોન્સ ક્લીન કરવા માટે
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const grid = document.getElementById('customer-product-grid');
                grid.innerHTML = '';

                if(rows.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-gray-500">No products found.</p>`;
                    return;
                }

                rows.forEach(row => {
                    const title = row.c[0] ? row.c[0].v : 'Premium Find';
                    const image = row.c[1] ? row.c[1].v : 'https://images.unsplash.com/photo-1544816155-12df9643f363?q=80&w=400';
                    const link = row.c[2] ? row.c[2].v : '#';

                    grid.innerHTML += `
                        <div class="bg-white overflow-hidden rounded border border-gray-100 shadow-xs hover:shadow-md transition group">
                            <div class="aspect-square bg-gray-100 overflow-hidden relative">
                                <img src="${image}" alt="${title}" class="w-full h-full object-cover group-hover:scale-102 transition duration-500">
                            </div>
                            <div class="p-4 text-center">
                                <h3 class="font-serif text-gray-800 text-sm mb-3 truncate px-2">${title}</h3>
                                <a href="${link}" target="_blank" class="w-full block brand-bg-dark text-white text-[10px] tracking-widest font-semibold py-2 uppercase hover:bg-opacity-90 transition">
                                    View Product
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById('customer-product-grid').innerHTML = `<p class="col-span-full text-center text-red-500">Failed to load products. Please check configuration.</p>`;
            }
        }

        fetchProducts();
    </script>
</body>
</html>
