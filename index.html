<script>
const SHEET_ID = "PASTE_YOUR_GOOGLE_SHEET_ID_HERE";

async function fetchProducts() {
  const grid = document.getElementById("customer-product-grid");

  try {
    const response = await fetch(
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`
    );

    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;

    grid.innerHTML = "";

    rows.forEach((row) => {
      const title = row.c[0]?.v || "Product";
      const image = row.c[1]?.v || "https://via.placeholder.com/400";
      const link = row.c[2]?.v || "#";

      const card = `
        <div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">
          <img src="${image}" alt="${title}" class="w-full h-60 object-cover">

          <div class="p-4">
            <h3 class="font-semibold text-lg mb-3">${title}</h3>

            <a href="${link}"
               target="_blank"
               class="block text-center bg-[#5B634E] text-white py-3 rounded-lg font-semibold">
               View on Amazon
            </a>
          </div>
        </div>
      `;

      grid.innerHTML += card;
    });

    if (rows.length === 0) {
      grid.innerHTML =
        "<p class='text-center col-span-full'>No products found.</p>";
    }
  } catch (error) {
    console.error(error);

    grid.innerHTML = `
      <p class="text-center text-red-500 col-span-full">
        Products load failed. Check Sheet ID and Sharing settings.
      </p>
    `;
  }
}

fetchProducts();
</script>
