<!DOCTYPE html>
<html>
<head>
<title>Prime US Finds</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}
header{
background:#232f3e;
color:white;
padding:20px;
text-align:center;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.btn{
display:block;
background:#ff9900;
color:white;
text-decoration:none;
padding:10px;
text-align:center;
border-radius:5px;
margin-top:10px;
}
</style>
</head>
<body>

<header>
<h1>Prime US Finds</h1>
<p>Best Amazon US Products</p>
</header>

<div class="products">

<div class="card">
<h3>Apple Watch</h3>
<a class="btn" href="#">View Product</a>
</div>

<div class="card">
<h3>AirPods Pro</h3>
<a class="btn" href="#">View Product</a>
</div>

<div class="card">
<h3>Kindle Paperwhite</h3>
<a class="btn" href="#">View Product</a>
</div>

</div>

</body>
</html>
