<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PrimeUSFinds</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f8f8f8;
}

.topbar{
background:#556b2f;
color:white;
text-align:center;
padding:10px;
}

header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
padding:10px;
width:50%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
color:#556b2f;
}

.btn{
display:block;
background:#556b2f;
color:white;
text-align:center;
padding:12px;
text-decoration:none;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">Best Amazon US Deals Updated Daily</div>

<header>
<h2>PrimeUSFinds</h2>
<input class="search" placeholder="Search products...">
</header>

<h2 style="text-align:center">Featured Products</h2>

<section class="products" id="product-grid"></section>

<script>
const SHEET_ID="1r7iY0sippv8hpAHNbYMuMDGEWzfN_xm4CFcv2RXzUG8";

async function loadProducts(){
const grid=document.getElementById("product-grid");

try{
const response=await fetch(
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`
);

const text=await response.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

grid.innerHTML="";

json.table.rows.forEach(row=>{

const title=row.c[0]?.v || "Product";
const image=row.c[1]?.v || "";
const link=row.c[2]?.v || "#";
const price=row.c[3]?.v || "";

grid.innerHTML+=`
<div class="card">
<img src="${image}">
<div class="card-content">
<h3>${title}</h3>
<p class="price">${price}</p>
<a href="${link}" target="_blank" class="btn">View on Amazon</a>
</div>
</div>
`;

});
}catch(e){
grid.innerHTML="<h3>Products failed to load</h3>";
}
}

loadProducts();
</script>

</body>
</html>
