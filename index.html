<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeUS Finds — Curated Amazon Picks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <img src="logo.png" alt="PrimeUS Finds" class="logo">
                <p class="tagline">A small curated shelf of things worth buying on Amazon</p>
            </div>
        </header>

        <div class="container">
            <!-- Social Share Links -->
            <div class="social-row">
                <span class="social-label">Share this shelf</span>
                <div class="social-buttons">
                    <a href="https://www.facebook.com/sharer/sharer.php?u=https://prime-us-finds.vercel.app" target="_blank" class="pill pill-facebook">Facebook</a>
                    <a href="https://pinterest.com/pin/create/button/?url=https://prime-us-finds.vercel.app&description=Check%20out%20my%20products!" target="_blank" class="pill pill-pinterest">Pinterest</a>
                    <a href="#" onclick="alert('Instagram par manually share karo!')" class="pill pill-instagram">Instagram</a>
                </div>
            </div>

            <!-- Add Product Form -->
            <div class="form-card">
                <h2 id="formTitle"><span class="form-icon">+</span> Add a New Find</h2>
                <form id="productForm">
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="productName" placeholder="e.g. Wide Leg Palazzo Pants" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDesc" placeholder="Product ke baare mein likho..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Price ($) <span class="optional-tag">optional</span></label>
                            <input type="number" step="0.01" id="productPrice" placeholder="Leave blank to show live Amazon price">
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Amazon Affiliate Link *</label>
                        <input type="url" id="affiliateLink" placeholder="https://amzn.to/xxxxxxx" required>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-submit">Add to Shelf</button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" style="display: none;">Cancel Edit</button>
                </form>
            </div>

            <!-- Products Display -->
            <div class="products-section">
                <div class="section-heading">
                    <h2 id="productCount">0 Finds</h2>
                    <span class="section-rule"></span>
                </div>
                <div class="products-grid" id="productsGrid">
                    <div class="empty-state">
                        <p>Koi product nahi. Upper form se add karo!</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Prices shown are for reference — always confirm the current price on Amazon before buying.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
